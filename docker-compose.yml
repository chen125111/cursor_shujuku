# ==========================================
# 实验室管理系统 - Docker Compose 编排
# 气体水合物相平衡数据管理系统
# ==========================================

version: '3.8'

services:
  # 后端 API 服务
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: lab-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SECRET_KEY=${SECRET_KEY:-your-production-secret-key-change-me}
      - DATABASE_PATH=/app/data/gas_data.db
      - SECURITY_DB_PATH=/app/data/security.db
      - BACKUP_DIR=/app/backups
      - REDIS_URL=redis://redis:6379/0
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/statistics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - lab-network
    depends_on:
      redis:
        condition: service_healthy

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: lab-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - lab-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: lab-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 默认使用 HTTP 配置，SSL 见 docker-compose.ssl.yml
      - ./nginx/nginx-http-only.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - lab-network

  # MySQL（可选，生产环境使用）
  mysql:
    image: mysql:8.0
    container_name: lab-mysql
    restart: unless-stopped
    profiles:
      - mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: gas_data
      MYSQL_USER: ${MYSQL_USER:-gasapp}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-gasapp_password}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - lab-network

  # Prometheus 监控
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: lab-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - lab-network

  # Grafana 可视化
  grafana:
    image: grafana/grafana:10.2.0
    container_name: lab-grafana
    restart: unless-stopped
    profiles:
      - monitoring
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - lab-network

  # Loki 日志收集
  loki:
    image: grafana/loki:2.9.0
    container_name: lab-loki
    restart: unless-stopped
    profiles:
      - monitoring
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - lab-network

  # Promtail 日志采集
  promtail:
    image: grafana/promtail:2.9.0
    container_name: lab-promtail
    restart: unless-stopped
    profiles:
      - monitoring
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - lab-network

networks:
  lab-network:
    driver: bridge

volumes:
  redis-data:
  mysql-data:
  prometheus-data:
  grafana-data:
  loki-data:
