# ==========================================
# 启用 SSL 的 Docker Compose 覆盖
# 使用前请先运行 scripts/init-letsencrypt.sh 获取证书
# 或 scripts/ssl-self-signed.sh 生成自签名证书
# ==========================================
version: '3.8'

services:
  nginx:
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/nginx/ssl:ro
      - ./certbot/www:/var/www/certbot:ro
